<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Test Installer - Install Location</title>

        <style>
            html,
            body {
                margin: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
            }

            body {
                font-family: 'Segoe UI', Arial, sans-serif;
                background: linear-gradient(135deg, #4f46e5, #6366f1);
                display: flex;
                align-items: center;
                justify-content: center;
            }
        </style>
    </head>
    <body>
        <div
            style="
                width: 720px;
                height: 400px;
                background: #ffffff;
                border-radius: 16px;
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
                padding: 40px;
                box-sizing: border-box;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            "
        >
            <!-- Header -->
            <div style="display: flex; align-items: center">
                <!-- Logo -->
                <div
                    style="
                        width: 100%;
                        height: 64px;
                        border-radius: 14px;
                        background: #4f46e5;
                        color: #ffffff;
                        font-size: 28px;
                        font-weight: bold;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        margin-right: 20px;
                    "
                >
                    Tun Installer
                </div>
            </div>

            <!-- Disk Space Info -->
            <div
                style="
                    background: #f9fafb;
                    border-radius: 12px;
                    padding: 20px;
                    border: 1px solid #e5e7eb;
                "
            >
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px">
                    <span style="color: #374151">Available disk space:</span>
                    <strong id="volume-space-available">12.5 GB</strong>
                </div>

                <div style="display: flex; justify-content: space-between; margin-bottom: 10px">
                    <span style="color: #374151">Required disk space:</span>
                    <strong id="volume-space-required">500 MB</strong>
                </div>

                <div style="display: flex; justify-content: space-between">
                    <span style="color: #374151">Remaining after installation:</span>
                    <strong id="volume-space-remaining">12.0 GB</strong>
                </div>
            </div>

            <!-- Footer -->
            <div style="display: flex; justify-content: flex-end">
                <button
                    style="
                        background: #4f46e5;
                        color: #ffffff;
                        border: none;
                        border-radius: 8px;
                        padding: 12px 28px;
                        font-size: 16px;
                        cursor: pointer;
                        transition: background 0.2s ease;
                    "
                    onmouseover="this.style.background = '#4338ca'"
                    onmouseout="this.style.background = '#4f46e5'"
                    onclick="navigateToVerifyDialog()"
                >
                    Next →
                </button>
            </div>
        </div>

        <script>
            window.initApp = function () {
                document.getElementById('volume-space-available').innerText = formatBytes(
                    window.App.data.volumeSpaceAvailable,
                );
                document.getElementById('volume-space-required').innerText = formatBytes(
                    window.App.data.volumeSpaceRequired,
                );
                document.getElementById('volume-space-remaining').innerText = formatBytes(
                    window.App.data.volumeSpaceRemaining,
                );
            };

            function navigateToVerifyDialog() {
                window.App.navigateTo('3_verify-dialog.html', 'firstInstall');
            }

            function formatBytes(bytes) {
                const KB = 1024;
                const MB = 1024 * 1024;
                const GB = 1024 * 1024 * 1024;
                const TB = 1024 * 1024 * 1024 * 1024;

                if (bytes >= TB) {
                    return (bytes / TB).toFixed(2) + ' TB';
                } else if (bytes >= GB) {
                    return (bytes / GB).toFixed(2) + ' GB';
                } else if (bytes >= MB) {
                    return (bytes / MB).toFixed(2) + ' MB';
                } else if (bytes >= KB) {
                    return (bytes / KB).toFixed(2) + ' KB';
                } else {
                    return bytes + ' B';
                }
            }
        </script>
    </body>
</html>
